# AI-Compass 智览 - 大模型定价与能力对比数据源
# 数据来源：各厂商官方定价文档（截至 2025 年中）
# 能力评分来源：MMLU、HumanEval、GPQA 等公开评测集的百分制归一化得分（近似值）
# 汇率参考：1 USD = 7.2 CNY
#
# 字段说明：
#   name: 模型名称
#   publisher: 发布商
#   country: 国家/地区
#   category: 分类 (international / domestic)
#   context_window: 上下文窗口（人类可读格式）
#   context_window_tokens: 上下文窗口（数值）
#   input_price_cny_per_1m: 输入价格（元/百万 Token）
#   output_price_cny_per_1m: 输出价格（元/百万 Token）
#   daily_api_calls_estimate: 日均调用量估算（次）
#   features: 特点标签
#   release_date: 发布时间
#   capabilities: 多维能力面板（百分制归一化得分）
#     - coding: 代码生成能力
#     - reasoning: 逻辑推理能力
#     - long_context: 长文本理解能力
#     - multilingual: 多语言能力
#     - general_knowledge: 综合知识能力

models:
  # 国际模型
  - name: "GPT-4o"
    publisher: "OpenAI"
    country: "美国"
    category: "international"
    context_window: "128K"
    context_window_tokens: 128000
    input_price_cny_per_1m: 18.00
    output_price_cny_per_1m: 72.00
    daily_api_calls_estimate: 50000000
    features: ["多模态", "实时推理", "速度最快"]
